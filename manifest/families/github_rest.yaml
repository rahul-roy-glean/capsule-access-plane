family: github_rest
version: "1.0"
surface_kind: http
logical_actions:
  - name: read_repo
    risk_class: standard
    write: false
  - name: create_issue
    risk_class: standard
    write: true
  - name: merge_pr
    risk_class: elevated
    write: true
supported_lanes:
  - direct_http
  - remote_execution
preferred_lane:
  default: direct_http
auth_patterns:
  - bearer_token
  - github_app
phantom_env:
  GH_TOKEN: phantom
destinations:
  - host: api.github.com
    port: 443
    protocol: https
method_constraints:
  - method: GET
    path_pattern: "/repos/**"
  - method: POST
    path_pattern: "/repos/**"
  - method: PUT
    path_pattern: "/repos/**"
  - method: PATCH
    path_pattern: "/repos/**"
  - method: DELETE
    path_pattern: "/repos/**"
  - method: POST
    path_pattern: "/graphql"
  - method: GET
    path_pattern: "/user"
  - method: GET
    path_pattern: "/user/**"
